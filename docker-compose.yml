services:
  postgres:
    image: postgres:18.3
    container_name: chatview-postgres
    environment:
      POSTGRES_DB: chatview
      POSTGRES_USER: chatview
      POSTGRES_PASSWORD: chatview
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "5432:5432"
    volumes:
      - chatview-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatview -d chatview"]
      interval: 2s
      timeout: 3s
      retries: 20

volumes:
  chatview-postgres-data:
