name: clo

services:
  postgres:
    image: postgres:18
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatview
      POSTGRES_DB: chatview
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatview -d chatview"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    image: ghcr.io/toyyay/clo:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://chatview:${POSTGRES_PASSWORD}@postgres:5432/chatview
      CHATVIEW_AGENT_TOKEN: ${CHATVIEW_AGENT_TOKEN}
      PORT: "3737"
    ports:
      - "127.0.0.1:3737:3737"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"const r=await fetch('http://127.0.0.1:3737/api/health'); if (!r.ok) process.exit(1)\""]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    network_mode: host
    depends_on:
      app:
        condition: service_healthy
