name: clo

services:
  postgres:
    image: postgres:18.3
    restart: unless-stopped
    environment:
      POSTGRES_USER: chatview
      POSTGRES_DB: chatview
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/18/docker
    volumes:
      - ./pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatview -d chatview"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    image: ghcr.io/toyyay/clo:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://chatview:${POSTGRES_PASSWORD}@postgres:5432/chatview
      AUTO_MIGRATION: "true"
      DB_POOL_MAX: "5"
      AGENT_TOKEN: ${AGENT_TOKEN}
      WEB_TOKEN: ${WEB_TOKEN}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-3-flash-preview}
      OPENROUTER_REASONING_EFFORT: ${OPENROUTER_REASONING_EFFORT:-medium}
      DATA_DIR: /data
      PORT: "3737"
    volumes:
      - type: bind
        source: /root/clo/data
        target: /data
    ports:
      - "127.0.0.1:3737:3737"
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"const r=await fetch('http://127.0.0.1:3737/api/health'); if (!r.ok) process.exit(1)\""]
      interval: 5s
      timeout: 3s
      retries: 20
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${TUNNEL_TOKEN}
    network_mode: host
    depends_on:
      app:
        condition: service_healthy
